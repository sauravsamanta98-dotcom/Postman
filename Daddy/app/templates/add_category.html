{% extends "base.html" %}

{% block title %}Add Category - Daddy{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-lg">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0"><i class="fas fa-plus-circle"></i> Add Category</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Category Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" required placeholder="e.g., Groceries">
                    </div>

                    <div class="mb-3">
                        <label for="icon" class="form-label">Icon Emoji</label>
                        <input type="text" class="form-control" id="icon" name="icon" value="📁" placeholder="🍔 or 🚗">
                        <small class="form-text text-muted">Use emoji to represent the category</small>
                    </div>

                    <div class="mb-3">
                        <label for="color" class="form-label">Color</label>
                        <input type="color" class="form-control form-control-color" id="color" name="color" value="#3498db">
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg">
                            <i class="fas fa-save"></i> Create Category
                        </button>
                        <a href="{{ url_for('category.list_categories') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
